<!DOCTYPE html>
<html>
<head>
  <title>Komang Krisna</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: monospace;
      color: #00ffcc;
      background: black;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 2px solid #00ffcc;
      object-fit: cover;
      margin-bottom: 10px;
    }

    h1 {
      margin: 10px 0;
      animation: glitch 1s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 2px red; }
      50% { text-shadow: -2px -2px blue; }
      100% { text-shadow: 2px -2px green; }
    }

    .btn {
      display: block;
      width: 220px;
      margin: 10px auto;
      padding: 12px;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      text-decoration: none;
      border-radius: 20px;
    }

    .btn:active {
      background: #00ffcc;
      color: black;
    }

    .intro {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
      cursor: pointer;
      z-index: 10;
    }

  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- TAP MASUK -->
<div class="intro" onclick="start()">CLICK TO ENTER</div>

<!-- MAIN -->
<div class="container" id="main" style="display:none;">
  <img src="krisna.jpeg">
  <h1>Komang Krisna</h1>

  <!-- LINK SUDAH AKTIF -->
  <a href="https://instagram.com/m.krisna_13" target="_blank" class="btn">Instagram</a>
  <a href="https://tiktok.com/@k16a_13" target="_blank" class="btn">TikTok</a>
  <a href="https://wa.me/6285825419193" target="_blank" class="btn">WhatsApp</a>
  <a href="https://facebook.com/Komang Krisnayasa" target="_blank" class="btn">Facebook</a>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<script>
  function start() {
    document.querySelector(".intro").style.display = "none";
    document.getElementById("main").style.display = "block";
    document.getElementById("music").play();
  }

  // MATRIX EFFECT
  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");

  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;

  const letters = "01";
  const fontSize = 14;
  const columns = canvas.width / fontSize;

  const drops = [];

  for (let i = 0; i < columns; i++) {
    drops[i] = 1;
  }

  function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ffcc";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
      const text = letters.charAt(Math.floor(Math.random() * letters.length));
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
        drops[i] = 0;

      drops[i]++;
    }
  }

  setInterval(draw, 33);
</script>

</body>
</html>
