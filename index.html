<!DOCTYPE html>
<html>
<head>
  <title>Krisna | Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .container {
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.3);
      box-shadow: 0 0 25px rgba(0, 198, 255, 0.5);
      transition: 0.4s;
    }

    img:hover {
      transform: scale(1.08);
      box-shadow: 0 0 40px rgba(0, 198, 255, 0.9);
    }

    h1 {
      margin-top: 15px;
      font-weight: 500;
    }

    p {
      color: #ccc;
      font-size: 14px;
      margin-bottom: 25px;
    }

    .btn {
      display: block;
      width: 240px;
      margin: 10px auto;
      padding: 12px;
      border-radius: 25px;
      background: rgba(255,255,255,0.08);
      color: white;
      text-decoration: none;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      transition: 0.3s;
    }

    .btn:hover {
      background: rgba(0, 198, 255, 0.5);
      transform: scale(1.05);
    }

    @media (max-width: 600px) {
      img {
        width: 160px;
        height: 160px;
      }

      .btn {
        width: 80%;
      }
    }
  </style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">
  <img src="krisna.jpeg">

  <h1>Komang Krisna</h1>
  <p>Hai Aku Krisna🙋‍♂️</p>

  <a href="https://instagram.com/m.krisna_13" target="_blank" class="btn">Instagram</a>
  <a href="https://tiktok.com/@k16a_13" target="_blank" class="btn">TikTok</a>
  <a href="https://wa.me/6285825419193" target="_blank" class="btn">WhatsApp</a>
</div>

<!-- MUSIK -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<script>
  // SPARKLE
  const canvas = document.getElementById("stars");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let stars = [];

  for (let i = 0; i < 60; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5,
      d: Math.random()
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    stars.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();

      s.y += s.d;
      if (s.y > canvas.height) s.y = 0;
    });

    requestAnimationFrame(draw);
  }

  draw();

  // MUSIK AUTO SETELAH TAP PERTAMA
  const music = document.getElementById("music");

  function playMusic() {
    music.play().catch(() => {});
    document.removeEventListener("click", playMusic);
  }

  document.addEventListener("click", playMusic);
</script>

</body>
</html>
