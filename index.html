<!DOCTYPE html>
<html>
<head>
  <title>My Profile</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #000);
      background-size: 400% 400%;
      animation: gradient 10s ease infinite;
      color: white;
      text-align: center;
    }

    @keyframes gradient {
      0% {background-position: 0%}
      50% {background-position: 100%}
      100% {background-position: 0%}
    }

    .container {
      margin-top: 80px;
      animation: fadeIn 2s;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    img {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #00c6ff;
  box-shadow: 0 0 20px #00c6ff;
  transition: 0.3s;
}

img:hover {
  transform: scale(1.1);
  box-shadow: 0 0 40px #00c6ff;
}

    h1 {
      margin-top: 15px;
      text-shadow: 0 0 10px #00c6ff;
    }

    .typing {
      color: #ccc;
      height: 20px;
    }

    .btn {
      display: block;
      width: 220px;
      margin: 12px auto;
      padding: 12px;
      border-radius: 30px;
      background: transparent;
      border: 2px solid #00c6ff;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00c6ff;
      box-shadow: 0 0 15px #00c6ff;
      transform: scale(1.08);
    }

    /* MUSIC BUTTON */
    .music-box {
      position: fixed;
      bottom: 20px;
      right: 20px;
    }

    #btnMusic {
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      background: #00c6ff;
      color: white;
      box-shadow: 0 0 10px #00c6ff;
      cursor: pointer;
      transition: 0.3s;
    }

    #btnMusic:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #00c6ff;
    }

  </style>
</head>

<body>

  <div class="container">
    <img src="krisna.jpeg">

    <h1>Komang Krisnayasa</h1>
    <p class="typing" id="typing"></p>

    <a href="https://www.instagram.com/m.krisna_13/" class="btn">Instagram</a>
    <a href="https://tiktok.com/@k16a_13/" class="btn">TikTok</a>
    <a href="https://wa.me/6285825419193" class="btn">WhatsApp</a>
    <a herf="hhttps://www.facebook.com/share/1QKYEjH5zA/?mibextid=wwXIfr" class="btn">Facebook</a>
  </div>

  <!-- MUSIC -->
  <audio id="music" loop>
    <source src="music.mp3" type="audio/mp3">
  </audio>

  <div class="music-box">
    <button onclick="toggleMusic()" id="btnMusic">▶️ Play Music</button>
  </div>

  <script>
    // TYPING EFFECT
    const text = ["Hai aku krisna", "Content Creator", "Welcome to my site 🚀"];
    let i = 0;
    let j = 0;
    let currentText = "";
    let isDeleting = false;

    function type() {
      const element = document.getElementById("typing");

      if (i < text.length) {
        if (!isDeleting && j <= text[i].length) {
          currentText = text[i].substring(0, j++);
        } else if (isDeleting && j >= 0) {
          currentText = text[i].substring(0, j--);
        }

        element.innerHTML = currentText;

        if (j === text[i].length) isDeleting = true;
        if (j === 0) {
          isDeleting = false;
          i++;
          if (i === text.length) i = 0;
        }
      }

      setTimeout(type, isDeleting ? 50 : 100);
    }

    type();

    // MUSIC CONTROL
    const music = document.getElementById("music");
    const btn = document.getElementById("btnMusic");
    let isPlaying = false;

    function toggleMusic() {
      if (isPlaying) {
        music.pause();
        btn.innerHTML = "▶️ Play Music";
      } else {
        music.play();
        btn.innerHTML = "⏸️ Pause Music";
      }
      isPlaying = !isPlaying;
    }

    // Auto play setelah klik pertama
    document.body.addEventListener("click", function() {
      if (!isPlaying) {
        music.play();
        btn.innerHTML = "⏸️ Pause Music";
        isPlaying = true;
      }
    }, { once: true });

  </script>

</body>
</html>
